services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: encuesta_tmms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-docker.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: encuesta_tmms
      DB_USER: postgres
      DB_PASS: postgres
      SECRET_KEY: cambiar-esta-clave-en-produccion
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
