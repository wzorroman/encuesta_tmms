<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Neon - TMMS-24</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="neon-wrapper">
    <div class="neon-header">
        <h2>✦ Encuesta TMMS-24 ✦</h2>
        <p>Lee cada frase e indica tu grado de acuerdo. No hay respuestas incorrectas.</p>
    </div>

    <div class="neon-progress">
        <span>PROGRESO <span id="progreso-texto">0/24</span></span>
        <div class="neon-track"><div class="neon-bar" id="barra-progreso" style="width:0%"></div></div>
    </div>

    <form id="form-encuesta" novalidate>
        <div class="neon-card">
            <div class="row g-4">
                <div class="col-12">
                    <label class="neon-field-label">NOMBRE COMPLETO</label>
                    <input class="neon-input" name="nombre" placeholder="Ingrese su nombre" required onkeyup="this.value=this.value.toUpperCase()" autocomplete="off">
                </div>
                <div class="col-sm-6">
                    <label class="neon-field-label">GRADO</label>
                    <select class="neon-input" name="grado" required>
                        <option value="">—</option>
                        <option value="1°">1°</option>
                        <option value="2°">2°</option>
                        <option value="3°">3°</option>
                        <option value="4°">4°</option>
                        <option value="5°">5°</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="neon-field-label">SECCIÓN</label>
                    <input class="neon-input" name="seccion" placeholder="A, B, C" onkeyup="this.value=this.value.toUpperCase()" autocomplete="off">
                </div>
            </div>
        </div>

        <div id="preguntas-container"></div>

        <button type="button" class="neon-btn" id="btn-enviar">✦ ENVIAR RESPUESTAS ✦</button>
    </form>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content neon-modal">
            <div class="modal-body text-center py-4">
                <p class="fw-bold mb-1" style="color:#0ff;">¿CONFIRMAR ENVÍO?</p>
                <p class="small" style="color:#8888aa;">Una vez enviado no podrás modificarlo.</p>
                <div class="d-flex gap-3 justify-content-center mt-3">
                    <button type="button" class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-sm neon-btn-sm">Sí, guardar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const preguntas = [
        "Presto mucha atención a los sentimientos.",
        "Normalmente me preocupo mucho por lo que siento.",
        "Normalmente dedico tiempo a pensar en mis emociones.",
        "Pienso que merece la pena prestar atención a mis emociones y estado de ánimo.",
        "Dejo que mis sentimientos afecten a mis pensamientos.",
        "Pienso en mi estado de ánimo constantemente.",
        "A menudo pienso en mis sentimientos.",
        "Presto mucha atención a cómo me siento.",
        "Tengo claros mis sentimientos.",
        "Frecuentemente puedo definir mis sentimientos.",
        "Casi siempre sé cómo me siento.",
        "Normalmente conozco mis sentimientos sobre las personas.",
        "A menudo me doy cuenta de mis sentimientos en diferentes situaciones.",
        "Siempre puedo decir cómo me siento.",
        "A veces puedo decir cuáles son mis emociones.",
        "Puedo llegar a comprender mis sentimientos.",
        "Aunque a veces me siento triste, suelo tener una visión optimista.",
        "Aunque me sienta mal, procuro pensar en cosas agradables.",
        "Cuando estoy triste, pienso en todos los placeres de la vida.",
        "Intento tener pensamientos positivos aunque me sienta mal.",
        "Si doy demasiadas vueltas a las cosas, complicándolas, trato de calmarme.",
        "Me preocupo por tener un buen estado de ánimo.",
        "Tengo mucha energía cuando me siento feliz.",
        "Cuando estoy enfadado intento cambiar mi estado de ánimo."
    ];
    const container = document.getElementById('preguntas-container');
    preguntas.forEach((texto, i) => {
        const n = i+1;
        const div = document.createElement('div');
        div.className = 'pregunta-card';
        div.innerHTML = `<div class="neon-card"><p class="neon-pregunta"><span class="neon-numero">${String(n).padStart(2,'0')}</span>${texto}</p><div class="neon-opciones">${[1,2,3,4,5].map(v => `<label class="neon-radio"><input type="radio" name="p_${n}" value="${v}" required><span class="neon-radio-glow">${v}</span></label>`).join('')}</div></div>`;
        container.appendChild(div);
    });
</script>
<script src="../comun.js"></script>
</body>
</html>
