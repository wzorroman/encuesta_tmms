<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neobrutalist - TMMS-24</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div class="brutal-container">
    <div class="brutal-header">
        <h2>Encuesta TMMS-24</h2>
        <p>Lee cada frase e indica tu grado de acuerdo. No hay respuestas correctas ni incorrectas.</p>
    </div>

    <div class="brutal-progress">
        <span>Progreso</span>
        <span id="progreso-texto">0 / 24</span>
        <div class="brutal-progress-track"><div class="brutal-progress-bar" id="barra-progreso" style="width:0%"></div></div>
    </div>

    <form id="form-encuesta" novalidate>
        <div class="brutal-card">
            <div class="row g-3">
                <div class="col-12">
                    <label class="brutal-label">Nombre completo *</label>
                    <input class="brutal-input" name="nombre" placeholder="Ingrese su nombre" required onkeyup="this.value=this.value.toUpperCase()" autocomplete="off">
                </div>
                <div class="col-md-6">
                    <label class="brutal-label">Grado *</label>
                    <select class="brutal-input" name="grado" required>
                        <option value="">Seleccione...</option>
                        <option value="1°">1°</option>
                        <option value="2°">2°</option>
                        <option value="3°">3°</option>
                        <option value="4°">4°</option>
                        <option value="5°">5°</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="brutal-label">Sección</label>
                    <input class="brutal-input" name="seccion" placeholder="Ej: A" onkeyup="this.value=this.value.toUpperCase()" autocomplete="off">
                </div>
            </div>
        </div>

        <div id="preguntas-container"></div>

        <button type="button" class="brutal-btn" id="btn-enviar">ENVIAR RESPUESTAS</button>
    </form>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content brutal-modal">
            <div class="modal-header"><h5 class="modal-title fw-bold">CONFIRMAR</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body"><p class="fw-bold mb-0">¿Estás seguro de guardar tus respuestas?</p><p class="small mb-0">Una vez enviado no podrás modificarlas.</p></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-dark fw-bold" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-dark fw-bold">Sí, guardar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const preguntas = [
        "Presto mucha atención a los sentimientos.",
        "Normalmente me preocupo mucho por lo que siento.",
        "Normalmente dedico tiempo a pensar en mis emociones.",
        "Pienso que merece la pena prestar atención a mis emociones y estado de ánimo.",
        "Dejo que mis sentimientos afecten a mis pensamientos.",
        "Pienso en mi estado de ánimo constantemente.",
        "A menudo pienso en mis sentimientos.",
        "Presto mucha atención a cómo me siento.",
        "Tengo claros mis sentimientos.",
        "Frecuentemente puedo definir mis sentimientos.",
        "Casi siempre sé cómo me siento.",
        "Normalmente conozco mis sentimientos sobre las personas.",
        "A menudo me doy cuenta de mis sentimientos en diferentes situaciones.",
        "Siempre puedo decir cómo me siento.",
        "A veces puedo decir cuáles son mis emociones.",
        "Puedo llegar a comprender mis sentimientos.",
        "Aunque a veces me siento triste, suelo tener una visión optimista.",
        "Aunque me sienta mal, procuro pensar en cosas agradables.",
        "Cuando estoy triste, pienso en todos los placeres de la vida.",
        "Intento tener pensamientos positivos aunque me sienta mal.",
        "Si doy demasiadas vueltas a las cosas, complicándolas, trato de calmarme.",
        "Me preocupo por tener un buen estado de ánimo.",
        "Tengo mucha energía cuando me siento feliz.",
        "Cuando estoy enfadado intento cambiar mi estado de ánimo."
    ];
    const container = document.getElementById('preguntas-container');
    preguntas.forEach((texto, i) => {
        const n = i+1;
        const div = document.createElement('div');
        div.className = 'pregunta-card';
        div.innerHTML = `<div class="brutal-card"><p class="brutal-pregunta"><span class="brutal-numero">${n}.</span> ${texto}</p><div class="brutal-opciones">${[1,2,3,4,5].map(v => `<label class="brutal-radio"><input type="radio" name="p_${n}" value="${v}" required><span class="brutal-radio-box">${v}</span></label>`).join('')}</div></div>`;
        container.appendChild(div);
    });
</script>
<script src="../comun.js"></script>
</body>
</html>
