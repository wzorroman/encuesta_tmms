<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta completada - TMMS-24</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 text-center">
                    <div class="header-encuesta">
                        <div class="mb-3">
                            <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-white" style="width: 80px; height: 80px;">
                                <span style="color: #198754; font-size: 2.8rem; line-height: 1;">&#10004;</span>
                            </span>
                        </div>
                        <h2 class="mb-2">¡Encuesta TMMS-24 RESPONDIDA!</h2>
                    </div>
                    <div class="card-body p-5">
                        <p class="fs-5 mb-1">Gracias</p>
                        <p class="fs-3 fw-bold text-primary mb-1">{{ nombre }}</p>
                        <p class="fs-5 text-muted mb-3">Grado: {{ grado }}{% if seccion %} &mdash; Secci&oacute;n {{ seccion }}{% endif %}</p>
                        <p class="text-muted mb-4">
                            Tus respuestas han sido guardadas correctamente.
                        </p>
                        <a href="/" class="btn btn-primary btn-lg px-5">
                            Volver al inicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
